apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hospital-route
spec:
  parentRefs:
  - name: likhitha-kgateway

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hospital

    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /hospital

    backendRefs:
    - name: hospital-service
      port: 80