apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: retail-route
spec:
  parentRefs:
  - name: likhitha-kgateway

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /retail
    - path:
        type: PathPrefix
        value: /login
    - path:
        type: PathPrefix
        value: /register
    - path:
        type: PathPrefix
        value: /contact

    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /

    backendRefs:
    - name: capsule-service
      port: 82